<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="0;url=https://wifi-pay.kz/tariffs?mac={{ mac | urlencode }}&router_id={{ router_id | urlencode }}&cid={{ cid | urlencode }}">
  <title>Переход к тарифам</title>
  <!-- Yandex.Metrika counter -->
  <script type="text/javascript">
      (function(m,e,t,r,i,k,a){
          m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
          m[i].l=1*new Date();
          for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
          k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
      })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=108568669', 'ym');

</head>
<body>
  <p>Открываем тарифы...</p>
  <p><a id="go" href="#">Открыть вручную</a></p>
  <form id="goForm" method="get" action="/tariffs" style="display:none;">
    <input type="hidden" name="mac" value="{{ mac }}">
    <input type="hidden" name="router_id" value="{{ router_id }}">
    <input type="hidden" name="cid" value="{{ cid }}">
  </form>
  <script>
    (function () {
      var target = '/tariffs?mac={{ mac | urlencode }}&router_id={{ router_id | urlencode }}&cid={{ cid | urlencode }}';
      var absTarget = 'https://wifi-pay.kz' + target;
      var link = document.getElementById('go');
      if (link) link.href = absTarget;
      var form = document.getElementById('goForm');

      // 1) Пытаемся same-origin replace
      window.location.replace(target);

      // 2) Через 300мс дублируем абсолютным replace
      setTimeout(function () {
        if (document.visibilityState === 'visible') {
          window.location.replace(absTarget);
        }
      }, 300);

      // 3) Через 900мс fallback через form submit (другой механизм навигации)
      setTimeout(function () {
        if (document.visibilityState === 'visible' && form) {
          form.submit();
        }
      }, 900);
    })();
  </script>
</body>
</html>
