<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wi-Fi Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tariff-card { cursor: pointer; border: 2px solid #f1f5f9; transition: all 0.2s; }
        .tariff-card.active { border-color: #3b82f6; background-color: #eff6ff; border-width: 2px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-gray-800">

    <div class="bg-white rounded-[2.5rem] shadow-sm p-8 w-full max-w-[420px] border border-gray-100 text-center">
        <div class="flex justify-center mb-4 text-blue-500">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><circle cx="12" cy="20" r="1"></circle></svg>
        </div>
        <h1 class="text-xl font-bold mb-1">Высокоскоростной Wi-Fi</h1>
        <p class="text-gray-400 text-sm mb-8 px-4">Выберите время доступа и оплатите картой</p>

        <!-- Тарифы -->
        <div class="space-y-3 mb-6 text-left">
            <div onclick="selectTariff(0, '15 минут бесплатно', this)" class="tariff-card flex items-center justify-between p-4 rounded-2xl">
                <span class="font-semibold">15 минут бесплатно</span>
                <span class="font-bold text-gray-900">0 ₸</span>
            </div>
            <div onclick="selectTariff(490, '1 час доступа', this)" class="tariff-card flex items-center justify-between p-4 rounded-2xl">
                <span class="font-semibold">1 час доступа</span>
                <span class="font-bold text-gray-900">490 ₸</span>
            </div>
            <div onclick="selectTariff(990, '3 часа доступа', this)" class="tariff-card flex items-center justify-between p-4 rounded-2xl">
                <span class="font-semibold">3 часа доступа</span>
                <span class="font-bold text-gray-900">990 ₸</span>
            </div>
            <div onclick="selectTariff(2490, 'Безлимит на день', this)" class="tariff-card flex items-center justify-between p-4 rounded-2xl">
                <span class="font-semibold">Безлимит на день</span>
                <span class="font-bold text-gray-900">2490 ₸</span>
            </div>
        </div>

        <div id="pay-box" style="display: none;" class="pt-4 border-t border-gray-50">
            <button onclick="startPayment()" class="w-full bg-[#1c75ff] hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                ОПЛАТИТЬ <span id="btn-amount"></span> ₸
            </button>
        </div>
        
        <div class="mt-8 text-[10px] text-gray-300 tracking-widest uppercase">ID: {{ mac }}</div>
    </div>

    <!-- ФУТЕР С ЮРИДИЧЕСКИМИ ССЫЛКАМИ -->
    <div class="mt-12 text-center">
        <div class="font-bold text-gray-600 text-[12px] mb-3 uppercase tracking-widest">ИП КАЛКИЕВ</div>
        <div class="flex justify-center space-x-6 text-blue-500 text-[11px] font-medium mb-4">
            <a href="/payment_methods" class="hover:underline">Оплата и Возврат</a>
            <a href="/offer" class="hover:underline">Оферта</a>
            <a href="/privacy" class="hover:underline">Приватность</a>
        </div>
        <div class="text-[10px] text-gray-400">© 2026 Wi-Fi Pay.</div>
    </div>

    <script>
        let selectedAmount = 0;

        function selectTariff(amt, desc, el) {
            selectedAmount = amt;
            // Убираем класс active у всех
            document.querySelectorAll('.tariff-card').forEach(c => c.classList.remove('active'));
            // Добавляем текущему
            el.classList.add('active');
            
            const payBox = document.getElementById('pay-box');
            if (amt > 0) {
                payBox.style.display = 'block';
                document.getElementById('btn-amount').innerText = amt;
            } else {
                payBox.style.display = 'none';
                // Тут можно добавить вызов бесплатного доступа, если нужно
            }
        }

        async function startPayment() {
            if (selectedAmount <= 0) return;

            const btn = document.querySelector('button[onclick="startPayment()"]');
            btn.innerText = "ЗАГРУЗКА...";
            btn.disabled = true;

            try {
                const fd = new FormData();
                fd.append('amount', selectedAmount);
                fd.append('mac', "{{ mac }}");

                const res = await fetch('/get_pay_link', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.url) {
                    // Используем штатный способ открытия виджета Freedom Pay
                    const paybox = new Paybox(data);
                    paybox.create();
                } else {
                    alert("Ошибка получения ссылки оплаты");
                }
            } catch (e) {
                console.error(e);
                alert("Ошибка связи с сервером");
            } finally {
                btn.innerText = "ОПЛАТИТЬ " + selectedAmount + " ₸";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
