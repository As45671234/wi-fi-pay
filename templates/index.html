    <style>
        /* Полностью автономные стили (без внешних библиотек) */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #1f2937; }
        .card { background: #ffffff; border-radius: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2rem; width: 85%; max-width: 420px; text-align: center; border: 1px solid #f1f5f9; }
        .icon { margin-bottom: 0.75rem; display: flex; justify-content: center; }
        .logo-img { height: 64px; width: auto; object-fit: contain; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem 0; color: #111827; }
        .desc { color: #9ca3af; font-size: 0.875rem; margin-bottom: 2rem; padding: 0 10px; line-height: 1.3; }
        
        .tariff-list { text-align: left; margin-bottom: 1.5rem; }
        .tariff-card { cursor: pointer; border: 2px solid #dbeafe; border-radius: 1.35rem; margin-bottom: 0.8rem; transition: all 0.2s ease; overflow: hidden; }
        .tariff-card:active { transform: scale(0.98); }
        .tariff-card.active { border-color: #60a5fa; background-color: #f8fbff; box-shadow: 0 12px 24px rgba(59,130,246,0.14); }

        .tariff-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 0.95rem 1.05rem; }
        .t-left { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
        .t-icon { width: 40px; height: 40px; border-radius: 999px; border: 2px solid #60a5fa; color: #3b82f6; display: flex; align-items: center; justify-content: center; background: #eff6ff; flex: 0 0 40px; }
        .t-name { font-weight: 700; color: #1f2937; font-size: 0.96rem; margin: 0; }
        .t-sub { margin: 2px 0 0; font-size: 0.76rem; color: #a3acb8; }
        .t-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .t-badge { font-size: 0.62rem; font-weight: 700; color: #fff; background: #60a5fa; border-radius: 8px; padding: 2px 8px; text-transform: uppercase; letter-spacing: 0.03em; }
        .t-badge.badge-super { background: linear-gradient(135deg, #f59e0b, #f97316); box-shadow: 0 2px 6px rgba(249,115,22,0.35); }
        .tariff-card.best-value { border-color: #fbbf24; box-shadow: 0 6px 18px rgba(245,158,11,0.14); }
        .tariff-card.best-value.active { border-color: #f59e0b; background-color: #fffaf0; box-shadow: 0 12px 24px rgba(245,158,11,0.24); }
        .tariff-card.best-value .selected-strip { background: linear-gradient(125deg, #fbbf24 0%, #f59e0b 45%, #f97316 100%); }
        .t-price {
            display: inline-flex;
            align-items: baseline;

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: "tnum" 1, "lnum" 1;
            line-height: 0.95;
            color: #0f1b34;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }
        .t-price .num {
            font-size: 1.52rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        .t-price .cur {
            font-size: 1.22rem;
            font-weight: 700;

        .selected-left { display: flex; align-items: center; gap: 10px; }
        .selected-check { width: 34px; height: 34px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.75); display: flex; align-items: center; justify-content: center; }
        .selected-name { margin: 0; font-size: 0.94rem; font-weight: 700; color: #f5fbff; }
        .selected-sub { margin: 1px 0 0; font-size: 0.76rem; color: #d9efff; }
        .selected-price {
            display: inline-flex;
            align-items: baseline;
            gap: 0.18em;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            background: linear-gradient(180deg, #1f5ca4, #1b477d);
            border-radius: 12px;
            padding: 7px 14px;
            border: 1px solid rgba(255,255,255,0.35);
            font-variant-numeric: tabular-nums lining-nums;
            font-feature-settings: "tnum" 1, "lnum" 1;
            line-height: 0.95;
        }
        .selected-price .num {
            font-size: 1.52rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        .selected-price .cur {
            font-size: 1.22rem;
            font-weight: 700;
            opacity: 0.95;
        }
        .tariff-card.active .selected-strip { display: flex; }
        
        #pay-btn-area { display: none; border-top: 1px solid #f1f5f9; padding-top: 1.5rem; margin-top: 1rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pay-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.97);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .pay-overlay-spinner {
            width: 52px; height: 52px;
            border: 5px solid #e5e7eb; border-top-color: #1c75ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 1.2rem;
        }
        .pay-overlay-text { font-size: 1rem; font-weight: 600; color: #374151; font-family: -apple-system, sans-serif; }
        
        .btn { display: block; box-sizing: border-box; background-color: #1c75ff; color: white; border: none; width: 100%; padding: 1.1rem; border-radius: 1.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(28, 117, 255, 0.25); text-decoration: none; text-align: center; }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .mac-id { font-size: 0.7rem; color: #d1d5db; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2rem; }
        
        .footer { margin-top: 2rem; text-align: center; width: 100%; max-width: 420px; }
        .f-line { height: 1px; background: #e5e7eb; margin-bottom: 1.5rem; width: 100%; }
        .f-title { font-weight: 700; color: #4b5563; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem;}
        .f-links { margin-bottom: 1rem; display: flex; justify-content: center; gap: 15px; }
        .f-links a { color: #3b82f6; text-decoration: none; font-weight: 600; font-size: 0.75rem; }
        .f-email { font-size: 0.75rem; color: #9ca3af; margin-top: 0.5rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">
            <img src="/img/logo.jpeg" alt="BusLink" class="logo-img">
        </div>
        <h1>Высокоскоростной Wi-Fi</h1>
        <p class="desc">Выберите тариф и оплатите картой любого банка</p>

        <div class="tariff-list" id="tariff-list"></div>

        <div id="pay-btn-area">
            <a class="btn" id="main-pay-btn" href="#" target="_blank" rel="noopener noreferrer" onclick="return handlePayClick(event)" style="display: none;">ОПЛАТИТЬ И ПОЛУЧИТЬ ДОСТУП</a>
        </div>
        
        <div style="text-align:center; margin-top: 1.2rem;">
            <a id="restore-link" href="#" style="color:#6b7280; font-size:0.82rem; text-decoration:none; border-bottom:1px dashed #d1d5db; padding-bottom:1px;">
                Уже оплачивали? Восстановить доступ
            </a>
        </div>

        <div class="mac-id">ID: <span id="mac-value">-</span> | ROUTER: <span id="router-value">-</span></div>
    </div>

    <!-- ФУТЕР -->
    <div class="footer">
        <div class="f-line"></div>
        <div class="f-title">ИП КАЛКИЕВ</div>
        <div class="f-links">
            <a href="/payment_methods">Оплата и Возврат</a>
            <a href="/offer">Оферта</a>
            <a href="/privacy">Приватность</a>
        </div>
        <div class="f-email">sanatkalkiyev@gmail.com | © 2026 Wi-Fi Pay</div>
    </div>

    <script>
    'use strict';
    
    let selectedAmt = -1;

    // fallback-tariffs:start
    const fallbackTariffs = [
  {
    "amount": 400,
    "minutes": 60,
    "title": "1 час доступа",
    "subtitle": "Доступ на 1 час",
    "badge": "Популярное"
  },
  {
    "amount": 700,
    "minutes": 180,
    "title": "3 часа доступа",
    "subtitle": "Доступ на 3 часа",
    "badge": ""
  },
  {
    "amount": 1111,
    "minutes": 1440,
    "title": "До конца поездки",
    "subtitle": "Максимум комфорта",
    "badge": "Супер выгодно"
  }
];
    // fallback-tariffs:end
    const jinjaVarStart = '{' + '{';
    const jinjaBlockStart = '{' + '%';

    function resolveTemplateValue(value, fallback = '') {
        if (typeof value !== 'string') {
            return fallback;
        }
        const trimmed = value.trim();
        if (!trimmed || trimmed.includes(jinjaVarStart) || trimmed.includes(jinjaBlockStart)) {
            return fallback;
        }
        return trimmed;
    }

    function resolveTemplateJson(raw, fallback) {
        if (typeof raw !== 'string') {
            return fallback;
        }
        const trimmed = raw.trim();
        if (!trimmed || trimmed.includes(jinjaVarStart) || trimmed.includes(jinjaBlockStart)) {
            return fallback;
        }
        try {
            const parsed = JSON.parse(trimmed);
            return Array.isArray(parsed) && parsed.length ? parsed : fallback;
        } catch (e) {
            return fallback;
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function tariffIcon(minutes) {
        if (minutes >= 1440) {
            return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="7 12 11 16 18 8"></polyline></svg>';
        }
        return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>';
    }

    function priceClass(index, total) {
        if (total >= 3 && index === total - 1) {
            return 't-price pill-dark';
        }
        return 't-price';
    }

    function renderTariffs(tariffs) {
        const list = document.getElementById('tariff-list');
        list.innerHTML = tariffs.map((tariff, index) => {
            const isBestValue = tariffs.length >= 3 && index === tariffs.length - 1;
            const visualBadge = tariff.badge || (isBestValue ? 'Супер выгодно' : (index === 1 ? 'Оптимальный' : ''));
            const badgeClass = isBestValue ? 't-badge badge-super' : 't-badge';
            const badgeHtml = visualBadge ? `<span class="${badgeClass}">${escapeHtml(visualBadge)}</span>` : '';
            const amount = Number(tariff.amount) || 0;
            const minutes = Number(tariff.minutes) || 0;
            const cardClass = isBestValue ? 'tariff-card best-value' : 'tariff-card';
            return `
                <div onclick="selectT(${amount}, this)" class="${cardClass}">
                    <div class="tariff-top">
                        <div class="t-left">
                            <span class="t-icon">${tariffIcon(minutes)}</span>
                            <div>
                                <p class="t-name">${escapeHtml(tariff.title)}</p>
                                <p class="t-sub">${escapeHtml(tariff.subtitle)}</p>
                            </div>
                        </div>
                        <div class="t-right">
                            ${badgeHtml}
                            <span class="${priceClass(index, tariffs.length)}"><span class="num">${escapeHtml(amount)}</span><span class="cur">₸</span></span>
                        </div>
                    </div>
                    <div class="selected-strip">
                        <div class="selected-left">
                            <span class="selected-check">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </span>
                            <div>
                                <p class="selected-name">${escapeHtml(tariff.title)}</p>
                                <p class="selected-sub">Выбранный тариф</p>
                            </div>
                        </div>
                        <span class="selected-price"><span class="num">${escapeHtml(amount)}</span><span class="cur">₸</span></span>
                    </div>
                </div>`;
        }).join('');
    }

    // Получаем данные из URL (которые прислал MikroTik) или из шаблона
    const urlParams = new URLSearchParams(window.location.search);
    const macAddress = urlParams.get('mac') || resolveTemplateValue("{{ mac }}", '00:00:00:00:00:00');
    const routerId = urlParams.get('router_id') || resolveTemplateValue("{{ router_id }}", 'astana_01');
    const cid = urlParams.get('cid') || resolveTemplateValue("{{ cid }}", 'local-preview');
    const tariffs = resolveTemplateJson(`{{ tariffs | tojson | safe }}`, fallbackTariffs);
    const userAgent = navigator.userAgent || '';
    const isAndroid = /android/i.test(userAgent);
    const isIOS = /iPad|iPhone|iPod/i.test(userAgent);

    renderTariffs(tariffs);
    document.getElementById('mac-value').textContent = macAddress;
    document.getElementById('router-value').textContent = routerId;
    document.getElementById('restore-link').href =
        '/restore_access?mac=' + encodeURIComponent(macAddress) +
        '&router_id=' + encodeURIComponent(routerId) +
        '&cid=' + encodeURIComponent(cid);

    function logClient(stage, elapsedMs, extra) {
        const payload = {
            cid,
            page: 'tariffs',
            stage,
            elapsed_ms: typeof elapsedMs === 'number' ? Math.round(elapsedMs) : null,
            extra: extra || ''
        };
        try {
            if (navigator.sendBeacon) {
                navigator.sendBeacon('/client_event', new Blob([JSON.stringify(payload)], {type: 'application/json'}));
                return;
            }
        } catch (e) {}
        fetch('/client_event', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            keepalive: true
        }).catch(() => {});
    }

    logClient('page_loaded', 0, 'ua=' + userAgent.slice(0, 80));

    function selectT(amount, element) {
        selectedAmt = amount;
        const cards = document.querySelectorAll('.tariff-card');
        cards.forEach(card => card.classList.remove('active'));
        element.classList.add('active');
        
        const btnArea = document.getElementById('pay-btn-area');
        const payBtn = document.getElementById('main-pay-btn');
        const paymentPath = `/choose_payment?amount=${amount}&mac=${encodeURIComponent(macAddress)}&router_id=${encodeURIComponent(routerId)}&cid=${encodeURIComponent(cid)}`;
        payBtn.href = `https://wifi-pay.kz${paymentPath}`;
        btnArea.style.display = 'block';
        payBtn.style.display = 'block';
        payBtn.textContent = `ОПЛАТИТЬ ${amount} ₸`;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 8000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    function handlePayClick(event) {
        const t0 = Date.now();
        logClient('pay_clicked', 0, 'amount=' + selectedAmt);

        // iOS: сначала создаём PAY_WINDOW, потом открываем choose_payment.
        // Спиннер показывает пока PAY_WINDOW не готов (~128мс).
        if (isIOS) {
            event.preventDefault();
            var ol = document.createElement('div');
            ol.className = 'pay-overlay';
            ol.innerHTML = '<div class="pay-overlay-spinner"></div><div class="pay-overlay-text">Открываем оплату...</div>';
            document.body.appendChild(ol);
            const chooseUrl = `/choose_payment?amount=${selectedAmt}&mac=${encodeURIComponent(macAddress)}&router_id=${encodeURIComponent(routerId)}&cid=${encodeURIComponent(cid)}`;
            fetch('/api/prepare_access', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mac: macAddress, router_id: routerId, cid: cid})
            }).catch(function(){}).finally(function() {
                logClient('pay_nav', Date.now() - t0, 'ios_pay_window_ready');
                window.location.href = chooseUrl;
            });
            return false;
        }

        // Android: перехватываем клик и делаем intent URL для Chrome.
        if (isAndroid) {
            event.preventDefault();
            const paymentPath = `/choose_payment?amount=${selectedAmt}&mac=${encodeURIComponent(macAddress)}&router_id=${encodeURIComponent(routerId)}&cid=${encodeURIComponent(cid)}`;
            const absPaymentUrl = `https://wifi-pay.kz${paymentPath}`;
            logClient('pay_nav_android', Date.now() - t0, 'intent_to_choose_payment');
            const intentUrl = 'intent://wifi-pay.kz' + paymentPath
                + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url='
                + encodeURIComponent(absPaymentUrl) + ';end';
            window.location.replace(intentUrl);
            return false;
        }

        // iOS и остальные: href уже установлен в selectT(), target=_blank открывает Safari/новую вкладку.
        logClient('pay_nav', Date.now() - t0, isIOS ? 'ios_anchor_blank' : 'other_anchor_blank');
        return true;
    }

    async function payKaspi() {
        if (selectedAmt <= 0) return;
        const t0 = Date.now();
        logClient('kaspi_pay_clicked', 0, 'amount=' + selectedAmt);
        const btn = document.getElementById('kaspi-pay-btn');
        btn.disabled = true;
        btn.innerHTML = 'Создаём заказ...';
        try {
            const resp = await fetchWithTimeout('/api/kaspi/create_order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mac: macAddress, router_id: routerId, amount: selectedAmt})
            }, 10000);
            const data = await resp.json();
            if (!data.ok || !data.contract_number) {
                throw new Error(data.error || 'create_order failed');
            }
            const kaspiUrl = `https://kaspi.kz/pay/Buslink?19626=${encodeURIComponent(data.contract_number)}`;
            logClient('kaspi_redirect', Date.now() - t0, 'contract=' + data.contract_number);
            window.location.href = kaspiUrl;
        } catch (e) {
            logClient('kaspi_error', Date.now() - t0, String(e));
            btn.disabled = false;
            btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#f8b200"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">K</text></svg> Оплатить через Kaspi';
            alert('Не удалось создать заказ. Попробуйте ещё раз.');
        }
    }

    window.onpageshow = function(event) {
        const payBtn = document.getElementById('main-pay-btn');
        if (payBtn) {
            payBtn.disabled = false;
            payBtn.innerText = selectedAmt > 0
                ? `ОПЛАТИТЬ ${selectedAmt} ₸`
                : "ОПЛАТИТЬ";
        }
    };
</script>
</body>
</html>
