<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wi-Fi Pay</title>
    <style>
        /* Полностью автономные стили (без внешних библиотек) */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #1f2937; }
        .card { background: #ffffff; border-radius: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2rem; width: 85%; max-width: 420px; text-align: center; border: 1px solid #f1f5f9; }
        .icon { color: #3b82f6; margin-bottom: 1rem; display: flex; justify-content: center; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem 0; color: #111827; }
        .desc { color: #9ca3af; font-size: 0.875rem; margin-bottom: 2rem; padding: 0 10px; line-height: 1.3; }
        
        .tariff-list { text-align: left; margin-bottom: 1.5rem; }
        .tariff-card { cursor: pointer; border: 2px solid #f1f5f9; padding: 1.2rem; border-radius: 1.2rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .tariff-card:active { transform: scale(0.98); }
        .tariff-card.active { border-color: #3b82f6; background-color: #f0f7ff; }
        
        .t-name { font-weight: 600; color: #374151; font-size: 0.95rem; }
        .t-price { font-weight: 700; color: #111827; font-size: 1.1rem; }
        
        #pay-btn-area { display: none; border-top: 1px solid #f1f5f9; padding-top: 1.5rem; margin-top: 1rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn { background-color: #1c75ff; color: white; border: none; width: 100%; padding: 1.1rem; border-radius: 1.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(28, 117, 255, 0.25); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .mac-id { font-size: 0.7rem; color: #d1d5db; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2rem; }
        
        .footer { margin-top: 2rem; text-align: center; width: 100%; max-width: 420px; }
        .f-line { height: 1px; background: #e5e7eb; margin-bottom: 1.5rem; width: 100%; }
        .f-title { font-weight: 700; color: #4b5563; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem;}
        .f-links { margin-bottom: 1rem; display: flex; justify-content: center; gap: 15px; }
        .f-links a { color: #3b82f6; text-decoration: none; font-weight: 600; font-size: 0.75rem; }
        .f-email { font-size: 0.75rem; color: #9ca3af; margin-top: 0.5rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        <h1>Высокоскоростной Wi-Fi</h1>
        <p class="desc">Выберите тариф и оплатите картой любого банка</p>

        <div class="tariff-list">
            <!-- Безлимит на день со скидкой -->
            <div onclick="selectT(500, this)" class="tariff-card" style="border-color: #f59e0b; background: #fffbeb; position: relative;">
                <div style="position: absolute; top: -10px; right: 12px; background: #ef4444; color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em;">−75%</div>
                <span class="t-name">Безлимит на день</span>
                <span class="t-price" style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
                    <span style="text-decoration: line-through; color: #9ca3af; font-size: 0.8rem; font-weight: 400;">2000 ₸</span>
                    <span style="color: #ef4444;">500 ₸</span>
                </span>
            </div>
        </div>

        <div id="pay-btn-area">
            <button class="btn" id="main-pay-btn" onclick="payNow()" style="display: none;">ОПЛАТИТЬ И ПОЛУЧИТЬ ДОСТУП</button>
        </div>
        
        <div class="mac-id">ID: {{ mac }} | ROUTER: {{ router_id }}</div>
    </div>

    <!-- ФУТЕР -->
    <div class="footer">
        <div class="f-line"></div>
        <div class="f-title">ИП КАЛКИЕВ</div>
        <div class="f-links">
            <a href="/payment_methods">Оплата и Возврат</a>
            <a href="/offer">Оферта</a>
            <a href="/privacy">Приватность</a>
        </div>
        <div class="f-email">sanatkalkiyev@gmail.com | © 2026 Wi-Fi Pay</div>
    </div>

    <script>
    'use strict';
    
    let selectedAmt = -1;

    // Получаем данные из URL (которые прислал MikroTik) или из шаблона
    const urlParams = new URLSearchParams(window.location.search);
    const macAddress = urlParams.get('mac') || "{{ mac }}";
    const routerId = urlParams.get('router_id') || "{{ router_id }}";
    const cid = urlParams.get('cid') || "{{ cid }}";
    const userAgent = navigator.userAgent || '';
    const isAndroid = /android/i.test(userAgent);
    const isIOS = /iPad|iPhone|iPod/i.test(userAgent);

    function logClient(stage, elapsedMs, extra) {
        const payload = {
            cid,
            page: 'tariffs',
            stage,
            elapsed_ms: typeof elapsedMs === 'number' ? Math.round(elapsedMs) : null,
            extra: extra || ''
        };
        try {
            if (navigator.sendBeacon) {
                navigator.sendBeacon('/client_event', new Blob([JSON.stringify(payload)], {type: 'application/json'}));
                return;
            }
        } catch (e) {}
        fetch('/client_event', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            keepalive: true
        }).catch(() => {});
    }

    logClient('page_loaded', 0, 'ua=' + userAgent.slice(0, 80));

    function selectT(amount, element) {
        selectedAmt = amount;
        const cards = document.querySelectorAll('.tariff-card');
        cards.forEach(card => card.classList.remove('active'));
        element.classList.add('active');
        
        const btnArea = document.getElementById('pay-btn-area');
        const payBtn = document.getElementById('main-pay-btn');
        btnArea.style.display = 'block';
        payBtn.style.display = 'block';
        payBtn.innerText = `ОПЛАТИТЬ ${amount} ₸ И ПОЛУЧИТЬ ДОСТУП`;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 8000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    function payNow() {
        const t0 = Date.now();
        logClient('pay_clicked', 0, 'amount=' + selectedAmt);
        const btn = document.getElementById('main-pay-btn');
        btn.disabled = true;
        btn.innerText = "ПОДГОТОВКА (3 МИН)...";

        const payUrl = `/start_payment?amount=${selectedAmt}&mac=${encodeURIComponent(macAddress)}&router_id=${encodeURIComponent(routerId)}&cid=${encodeURIComponent(cid)}`;

        // Android works better with a normal same-tab navigation after opening the browser.
        if (isAndroid) {
            logClient('pay_nav_android', Date.now() - t0, 'same_tab');
            window.location.href = payUrl;
            return;
        }

        // iOS captive portal requires target="_blank" to open Safari.
        if (isIOS) {
            logClient('pay_nav_ios', Date.now() - t0, 'blank_tab');
            const link = document.createElement('a');
            link.href = payUrl;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            return;
        }

        const link = document.createElement('a');
        logClient('pay_nav_other', Date.now() - t0, 'anchor_click');
        link.href = payUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.onpageshow = function(event) {
        const payBtn = document.getElementById('main-pay-btn');
        if (payBtn) {
            payBtn.disabled = false;
            payBtn.innerText = selectedAmt > 0
                ? `ОПЛАТИТЬ ${selectedAmt} ₸ И ПОЛУЧИТЬ ДОСТУП`
                : "ОПЛАТИТЬ И ПОЛУЧИТЬ ДОСТУП";
        }
    };
</script>
</body>
</html>
