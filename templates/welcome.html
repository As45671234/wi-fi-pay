<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wi-Fi Pay - Добро пожаловать</title>
    <style>
        /* Стили в едином стиле с основной страницей */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #1f2937; padding: 20px; }
        
        .welcome-card { background: #ffffff; border-radius: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2.5rem 2rem; width: 85%; max-width: 420px; text-align: center; border: 1px solid #f1f5f9; }
        
        .logo { margin-bottom: 1.5rem; }
        .logo svg { width: 70px; height: 70px; }
        
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 1rem 0; color: #111827; }
        
        .welcome-text { color: #6b7280; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; padding: 0 10px; }
        .welcome-text strong { color: #111827; font-weight: 600; }
        
        .features { text-align: left; margin-bottom: 2rem; background: #f9fafb; border-radius: 1.2rem; padding: 1.5rem; border: 1px solid #f1f5f9; }
        .feature-item { display: flex; align-items: center; margin-bottom: 1rem; color: #374151; font-size: 0.9rem; }
        .feature-item:last-child { margin-bottom: 0; }
        .feature-icon { color: #10b981; margin-right: 12px; font-size: 1.2rem; font-weight: 600; }
        
        .btn-start { background-color: #1c75ff; color: white; border: none; width: 100%; padding: 1.3rem 1rem; border-radius: 1.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(28, 117, 255, 0.25); transition: all 0.2s ease; }
        .btn-start:active { transform: scale(0.98); }
        .btn-start:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .btn-bonus { font-size: 0.75rem; margin-top: 0.4rem; opacity: 0.9; font-weight: 500; }
        
        .mac-id { font-size: 0.7rem; color: #d1d5db; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2rem; }

        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.93); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; }
        #loading-overlay.active { display: flex; }
        .spinner { width: 48px; height: 48px; border: 5px solid #e5e7eb; border-top-color: #1c75ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-msg { font-size: 1rem; font-weight: 600; color: #374151; }
        .loading-sub { font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="logo">
            <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        
        <h1>Добро пожаловать!</h1>
        
        <div class="welcome-text">
            Вы подключились к <strong>высокоскоростному Wi-Fi</strong>. Для доступа в интернет выберите удобный тариф и оплатите картой любого банка.
        </div>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Мгновенная активация доступа</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Безопасная оплата онлайн</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Гибкие тарифы от 1 часа до суток</span>
            </div>
        </div>
        
        <form id="prepareForm" action="/prepare_and_tariffs" method="get" style="margin: 0;">
            <input type="hidden" name="mac" value="{{ mac }}">
            <input type="hidden" name="router_id" value="{{ router_id }}">
            <input type="hidden" name="cid" value="{{ cid }}">
            <button type="submit" class="btn-start" id="btnStart">
                ВЫБРАТЬ ТАРИФ
            </button>
        </form>
        
        <div class="mac-id">ID: {{ mac }}</div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-msg">Открываем страницу тарифов...</div>
        <div class="loading-sub">Секунду</div>
    </div>

    <script>
    'use strict';

    var urlParams = new URLSearchParams(window.location.search);
    var macAddress = urlParams.get('mac') || "{{ mac }}";
    var routerId = urlParams.get('router_id') || "{{ router_id }}";
    var cid = urlParams.get('cid') || "{{ cid }}";
    var userAgent = navigator.userAgent || '';
    var isIOS = /iPad|iPhone|iPod/i.test(userAgent);
    var isAndroid = /android/i.test(userAgent);

    var form = document.getElementById('prepareForm');
    var btn = document.getElementById('btnStart');
    var overlay = document.getElementById('loading-overlay');
    var loadingSub = document.querySelector('.loading-sub');

    function logClient(stage, elapsedMs, extra) {
        var payload = {
            cid: cid,
            page: 'welcome',
            stage: stage,
            elapsed_ms: typeof elapsedMs === 'number' ? Math.round(elapsedMs) : null,
            extra: extra || ''
        };
        try {
            if (navigator.sendBeacon) {
                navigator.sendBeacon('/client_event', new Blob([JSON.stringify(payload)], {type: 'application/json'}));
                return;
            }
        } catch (e) {}
        fetch('/client_event', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            keepalive: true
        }).catch(function() {});
    }

    logClient('page_loaded', 0, 'ua=' + userAgent.slice(0, 80));

    form.addEventListener('submit', function(event) {
        // Android: мгновенный handoff в браузер БЕЗ загрузок и ожиданий.
        if (isAndroid) {
            event.preventDefault();
            var absPrepareUrl = 'https://wifi-pay.kz/prepare_and_tariffs?mac=' + encodeURIComponent(macAddress)
                + '&router_id=' + encodeURIComponent(routerId)
                + '&cid=' + encodeURIComponent(cid);
            window.location.replace(absPrepareUrl);
            return;
        }

        var t0 = Date.now();
        logClient('submit_clicked', 0, isIOS ? 'ios' : 'non-ios');

        // iOS captive: сначала дожидаемся prepare_access, потом делаем явный переход.
        if (isIOS) {
            event.preventDefault();
            btn.disabled = true;
            overlay.classList.add('active');
            if (loadingSub) {
                loadingSub.textContent = 'Подготавливаем доступ...';
            }

            fetch('/api/prepare_access', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mac: macAddress, router_id: routerId, cid: cid})
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data && data.ok) {
                    logClient('prepare_ok', Date.now() - t0, 'ios_nav_tariffs_same_origin');
                    var relTariffUrl = '/tariffs?mac=' + encodeURIComponent(macAddress) + '&router_id=' + encodeURIComponent(routerId) + '&cid=' + encodeURIComponent(cid);
                    var absTariffUrl = 'https://wifi-pay.kz' + relTariffUrl;
                    window.location.assign(relTariffUrl);

                    // iOS captive иногда задерживает переход. Если через 3с мы всё ещё здесь — fallback.
                    setTimeout(function() {
                        if (document.visibilityState === 'visible') {
                            logClient('nav_fallback_abs', Date.now() - t0, 'ios_still_visible_after_3s');
                            window.location.assign(absTariffUrl);
                        }
                    }, 3000);
                    return;
                }
                throw new Error((data && data.error) ? data.error : 'prepare_access failed');
            })
            .catch(function() {
                logClient('prepare_fail', Date.now() - t0, 'api_prepare_access_error');
                btn.disabled = false;
                overlay.classList.remove('active');
                if (loadingSub) {
                    loadingSub.textContent = 'Ошибка подготовки. Повторите.';
                }
            });
            return;
        }

        btn.disabled = true;
        overlay.classList.add('active');

        // Если переход не случился (каприз captive webview), возвращаем управление.
        setTimeout(function() {
            if (document.visibilityState === 'visible') {
                logClient('submit_timeout_visible', Date.now() - t0, 'non-ios-no-nav');
                btn.disabled = false;
                overlay.classList.remove('active');
            }
        }, 8000);
    });

    window.addEventListener('pageshow', function() {
        overlay.classList.remove('active');
        btn.disabled = false;
    });
    </script>

</body>
</html>
