<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Загрузка...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #374151;
        }
        .spinner {
            width: 52px; height: 52px;
            border: 5px solid #e5e7eb;
            border-top-color: #1c75ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg { font-size: 1rem; font-weight: 600; }
        .sub { font-size: 0.8rem; color: #9ca3af; margin-top: 0.4rem; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="msg">Подготавливаем доступ...</div>
    <div class="sub" id="sub">Секунду</div>

    <script>
    'use strict';
    var mac      = {{ mac      | tojson }};
    var routerId = {{ router_id | tojson }};
    var cid      = {{ cid      | tojson }};
    var tariffUrl = '/tariffs?mac=' + encodeURIComponent(mac)
                  + '&router_id=' + encodeURIComponent(routerId)
                  + '&cid=' + encodeURIComponent(cid);

    // Если через 10с ничего — всё равно переходим (/start_payment подстрахует).
    // PAY_WINDOW создаётся на сервере в фоне (fire-and-forget при загрузке /prepare_and_tariffs).
    // Ждём минимум 3 секунды — за это время биндинг гарантированно создаётся (~200ms).
    setTimeout(function() {
        window.location.replace(tariffUrl);
    }, 3000);
    </script>
</body>
</html>
