<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Загрузка...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #374151;
        }
        .spinner {
            width: 52px; height: 52px;
            border: 5px solid #e5e7eb;
            border-top-color: #1c75ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg { font-size: 1rem; font-weight: 600; }
        .sub { font-size: 0.8rem; color: #9ca3af; margin-top: 0.4rem; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="msg">Подготавливаем доступ...</div>
    <div class="sub" id="sub">Секунду</div>

    <script>
    'use strict';
    var mac      = {{ mac      | tojson }};
    var routerId = {{ router_id | tojson }};
    var cid      = {{ cid      | tojson }};
    var tariffUrl = '/tariffs?mac=' + encodeURIComponent(mac)
                  + '&router_id=' + encodeURIComponent(routerId)
                  + '&cid=' + encodeURIComponent(cid);

    // Если через 10с ничего — всё равно переходим (/start_payment подстрахует).
    // Сервер уже запустил PAY_WINDOW в фоне при загрузке этой страницы.
    // Параллельно делаем свой fetch — переходим как только ОБА условия выполнены:
    //   1) fetch к /api/prepare_access вернул ответ (PAY_WINDOW готов, обычно ~200ms)
    //   2) прошло минимум 1 секунда (чтобы спиннер не мелькал)
    var gone = false;
    function go() {
        if (gone) return;
        gone = true;
        window.location.replace(tariffUrl);
    }

    var minWait = new Promise(function(resolve) { setTimeout(resolve, 1000); });
    var pwReady = fetch('/api/prepare_access', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mac: mac, router_id: routerId, cid: cid })
    }).catch(function() {});  // ошибка — не страшно, /start_payment подстрахует

    Promise.all([minWait, pwReady]).then(go);

    // Страховка: не ждём дольше 8 секунд
    setTimeout(go, 8000);
    </script>
</body>
</html>
