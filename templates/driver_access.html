<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступ для водителей - Wi-Fi Pay</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f2937;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
            width: 88%;
            max-width: 440px;
            border: 1px solid #f1f5f9;
        }
        .icon { text-align: center; margin-bottom: 0.75rem; font-size: 2.5rem; }
        h1 { font-size: 1.2rem; font-weight: 700; margin: 0 0 0.5rem 0; color: #111827; text-align: center; }
        .desc { color: #6b7280; font-size: 0.85rem; margin: 0 0 1.5rem 0; line-height: 1.5; text-align: center; }
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 0.8rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            color: #b91c1c;
            font-size: 0.85rem;
            font-weight: 600;
        }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; margin-top: 1rem; }
        label:first-of-type { margin-top: 0; }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 0.85rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.9rem;
            font-size: 1.02rem;
            color: #111827;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
            font-family: inherit;
        }
        input:focus, select:focus { border-color: #1c75ff; }
        option:disabled { color: #d1d5db; }
        .btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background-color: #1c75ff;
            color: #fff;
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(28,117,255,0.25);
            text-align: center;
            margin-top: 1.5rem;
        }
        .btn:active { opacity: 0.88; }
        .meta { font-size: 0.7rem; color: #d1d5db; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1.2rem; text-align: center; }
        .limit-note { font-size: 0.75rem; color: #9ca3af; margin-top: 0.4rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🚌</div>
    <h1>Доступ для водителей</h1>
    <p class="desc">Выберите роутер автобуса и укажите номер телефона водителя. Телефон должен быть подключён к WiFi этого автобуса.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form action="/api/driver_access" method="POST">
        <input type="hidden" name="password" value="{{ password }}">

        <label for="router_id">Роутер (автобус)</label>
        <select id="router_id" name="router_id" required>
            <option value="">— выберите —</option>
            {% for r in routers %}
            <option value="{{ r.id }}" {% if r.id == router_id %}selected{% endif %} {% if r.full and r.id != router_id %}disabled{% endif %}>
                {{ r.id }} ({{ r.count }}/{{ max_drivers }}{% if r.full %} — занято{% endif %})
            </option>
            {% endfor %}
        </select>
        <p class="limit-note">Максимум {{ max_drivers }} водителя на один роутер.</p>

        <label for="phone">Номер телефона водителя</label>
        <input
            type="tel"
            id="phone"
            name="phone"
            value="{{ phone }}"
            placeholder="+7 777 000 00 00"
            autocomplete="tel"
            inputmode="tel"
            required
        >

        <label for="note">Комментарий (необязательно)</label>
        <input type="text" id="note" name="note" value="{{ note }}" placeholder="Имя водителя / номер автобуса">

        <button class="btn" type="submit">Выдать доступ</button>
    </form>

    <div class="meta">wifi-pay driver provisioning</div>
</div>
<script>
'use strict';
const phoneInput = document.getElementById('phone');

phoneInput.addEventListener('focus', function() {
    if (!this.value) this.value = '+7 ';
});

phoneInput.addEventListener('input', function() {
    let digits = this.value.replace(/\D/g, '');
    if (digits.startsWith('8') && digits.length > 1) digits = '7' + digits.slice(1);
    if (!digits.startsWith('7')) digits = '7' + digits.replace(/^7*/, '');
    digits = digits.slice(0, 11);
    let body = digits.slice(1);
    let out = '+7';
    if (body.length > 0) out += ' ' + body.slice(0, 3);
    if (body.length > 3) out += ' ' + body.slice(3, 6);
    if (body.length > 6) out += ' ' + body.slice(6, 8);
    if (body.length > 8) out += ' ' + body.slice(8, 10);
    this.value = out;
});
</script>
</body>
</html>
